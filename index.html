<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材收益與報價系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-creamy: #FFFEFA;
            --pastel-pink: #FFF0F6;
            --pastel-blue: #E6FBFF;
            --pastel-purple: #F3F0FF;
            --accent-pink: #FFC9C9;
            --accent-blue: #A5D8FF;
            --accent-purple: #D0BFFF;
            --warning-red: #FF8787;
        }

        body {
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            min-height: 100vh;
            color: #475569;
        }

        /* ── 庫存管理樣式 ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
        }
        .btn-active-in { background-color: #bae6fd; color: #0369a1; }
        .btn-active-out { background-color: #ddd6fe; color: #6d28d9; }
        .btn-active-profit { background-color: #fce7f3; color: #be185d; }
        .btn-inactive { background-color: #f8fafc; color: #cbd5e1; border: 1px solid #f1f5f9; }
        input, select { transition: all 0.2s; border: 1px solid #e2e8f0; }
        input:focus, select:focus { border-color: #7dd3fc; outline: none; box-shadow: 0 0 0 4px rgba(125, 211, 252, 0.1); }
        .delete-btn { transition: all 0.2s; opacity: 0.3; }
        tr:hover .delete-btn { opacity: 1; }

        /* ── 報價系統樣式 ── */
        .quote-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            border: 3px solid #FFFFFF;
            border-radius: 2.5rem;
            box-shadow: 0 15px 40px rgba(180, 180, 200, 0.08);
            width: 100%;
            max-width: 420px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #A5D8FF 0%, #D0BFFF 50%, #FFC9C9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .result-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.01);
        }
        .discount-badge {
            background: var(--accent-blue);
            color: white;
            padding: 2px 12px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 800;
        }
        .discount-table-item {
            background: white;
            border-radius: 1rem;
            padding: 10px 5px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        .discount-table-item.active {
            border-color: var(--accent-blue);
            background: var(--pastel-blue);
            transform: scale(1.05);
        }
        .quote-input {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #F1F3F5;
            font-size: 1.2rem !important;
            font-weight: 400 !important;
        }
        .quote-input:focus {
            border-color: var(--accent-blue) !important;
            box-shadow: 0 0 0 4px rgba(165, 216, 255, 0.15) !important;
            transform: translateY(-1px);
            outline: none;
        }
        .error-shake-infinite {
            animation: shake-infinite 1.2s cubic-bezier(.36,.07,.19,.97) infinite;
        }
        @keyframes shake-infinite {
            0%, 100% { transform: translate3d(0, 0, 0); }
            15%, 45%, 75% { transform: translate3d(-3px, 0, 0); }
            30%, 60%, 90% { transform: translate3d(3px, 0, 0); }
        }
        .alert-pulse { animation: pulse-red-soft 2s infinite; }
        @keyframes pulse-red-soft {
            0% { border-color: #FFE3E3; background-color: rgba(255, 245, 245, 0.8); }
            50% { border-color: #FFC9C9; background-color: rgba(255, 255, 255, 0.9); }
            100% { border-color: #FFE3E3; background-color: rgba(255, 245, 245, 0.8); }
        }
        .copy-btn {
            background: linear-gradient(135deg, #D0BFFF 0%, #A5D8FF 100%);
            color: white;
            transition: all 0.2s;
        }
        .copy-btn:active { transform: scale(0.95); }

        /* ── Tab 樣式 ── */
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: white; color: #0369a1; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tab-btn.inactive { background: transparent; color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

<!-- ── Tab 切換列 ── -->
<div class="max-w-6xl mx-auto mb-6">
    <div class="inline-flex bg-slate-100 rounded-2xl p-1.5 gap-1">
        <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active px-6 py-2.5 rounded-xl font-bold text-sm">
            📦 耗材管理
        </button>
        <button onclick="switchTab('quote')" id="tab-quote" class="tab-btn inactive px-6 py-2.5 rounded-xl font-bold text-sm">
            🖨️ UV 報價
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════
     頁面 1：耗材庫存管理
════════════════════════════════════════ -->
<div id="page-inventory" class="max-w-6xl mx-auto">
    <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="text-2xl font-bold text-sky-500 flex items-center gap-2">
             耗材收益管理
        </h1>
        <div id="connection-status" class="flex items-center gap-3 bg-white/80 px-4 py-2 rounded-full border border-white shadow-sm">
            <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse"></span>
            <span id="status-text" class="text-xs font-bold text-slate-500">雲端連線中...</span>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
        <div class="bg-gradient-to-br from-sky-400 to-sky-300 p-8 rounded-[2rem] shadow-lg text-white relative overflow-hidden">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-lg font-bold opacity-90 tracking-wide"> UV 統計</h3>
                <button onclick="resetProfit('uv')" class="text-[10px] bg-white/20 hover:bg-white/40 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold transition-all">🔄 重置收益</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1 tracking-widest uppercase">耗材支出總額</p>
                    <p class="text-3xl font-black" id="stat-uv-value">$0</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1 tracking-widest uppercase">累計總收益</p>
                    <p class="text-3xl font-black" id="stat-uv-profit">$0</p>
                </div>
            </div>
        </div>

        <div class="bg-gradient-to-br from-purple-400 to-purple-300 p-8 rounded-[2rem] shadow-lg text-white relative overflow-hidden">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-lg font-bold opacity-90 tracking-wide">割字統計</h3>
                <button onclick="resetProfit('vinyl')" class="text-[10px] bg-white/20 hover:bg-white/40 px-3 py-1.5 rounded-full backdrop-blur-sm font-bold transition-all">🔄 重置收益</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1 tracking-widest uppercase">耗材支出總額</p>
                    <p class="text-3xl font-black" id="stat-vinyl-value">$0</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1 tracking-widest uppercase">累計總收益</p>
                    <p class="text-3xl font-black" id="stat-vinyl-profit">$0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-8 shadow-sm">
                <h2 class="text-lg font-bold mb-8 text-slate-700"> 類別</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">交易類型</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="changeType('in')" id="type-in" class="btn-active-in p-3 rounded-2xl text-xs font-bold transition-all">進貨</button>
                            <button onclick="changeType('out')" id="type-out" class="btn-inactive p-3 rounded-2xl text-xs font-bold transition-all">出貨</button>
                            <button onclick="changeType('profit')" id="type-profit" class="btn-inactive p-3 rounded-2xl text-xs font-bold transition-all">賺的</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">分類</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="changeCategory('uv')" id="cat-uv" class="btn-active-in p-4 rounded-2xl font-bold text-sm">UV 庫存</button>
                            <button onclick="changeCategory('vinyl')" id="cat-vinyl" class="btn-inactive p-4 rounded-2xl font-bold text-sm">割字庫存</button>
                        </div>
                    </div>
                    <div id="name-field">
                        <label class="block text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">名稱</label>
                        <div id="name-input-container">
                            <input type="text" id="input-name" placeholder="請輸入耗材名稱" class="w-full p-4 rounded-2xl bg-white/80 font-bold text-slate-600">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div id="qty-box">
                            <label class="block text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">數量</label>
                            <input type="number" id="input-qty" value="1" min="1" class="w-full p-4 rounded-2xl bg-white/80 text-center font-black text-lg text-slate-600">
                        </div>
                        <div id="price-box">
                            <label id="price-label" class="block text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">金額 ($)</label>
                            <input type="number" id="input-price" placeholder="0" class="w-full p-4 rounded-2xl bg-white/80 text-center font-black text-lg text-sky-600">
                        </div>
                    </div>
                    <button onclick="submitTransaction()" id="submit-btn" disabled class="w-full bg-slate-200 text-slate-400 font-black py-5 rounded-[1.5rem] shadow-lg transition-all transform active:scale-95 cursor-not-allowed text-sm tracking-widest">
                        等待雲端連線...
                    </button>
                </div>
            </div>
            <div class="px-6 text-[10px] text-slate-400 italic text-center" id="last-sync-time">系統載入中...</div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="glass-card overflow-hidden">
                <div class="p-6 bg-sky-50 border-b border-sky-100">
                    <h2 class="font-bold text-sky-600 text-sm tracking-wider"> UV 耗材現況</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4">耗材名稱</th>
                                <th class="px-6 py-4 text-center">剩餘數量</th>
                                <th class="px-6 py-4">投入成本</th>
                                <th class="px-8 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-uv-body" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="p-6 bg-purple-50 border-b border-purple-100">
                    <h2 class="font-bold text-purple-600 text-sm tracking-wider"> 割字耗材現況</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4">耗材名稱</th>
                                <th class="px-6 py-4 text-center">剩餘數量</th>
                                <th class="px-6 py-4">投入成本</th>
                                <th class="px-8 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-vinyl-body" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     頁面 2：UV 報價系統
════════════════════════════════════════ -->
<div id="page-quote" class="hidden flex justify-center">
    <div class="quote-card p-7 md:p-8 my-4">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black gradient-text tracking-tighter">UV 印刷智能報價</h1>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[14px] font-black text-slate-500 mb-2 ml-1 flex items-center gap-1.5 uppercase tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-[#A5D8FF]"></span> 長度 (cm)
                    </label>
                    <input type="number" id="length" step="0.1" placeholder="0.0"
                        class="quote-input w-full px-5 py-3 rounded-xl text-slate-700">
                </div>
                <div>
                    <label class="block text-[14px] font-black text-slate-500 mb-2 ml-1 flex items-center gap-1.5 uppercase tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-[#D0BFFF]"></span> 寬度 (cm)
                    </label>
                    <input type="number" id="width" step="0.1" placeholder="0.0"
                        class="quote-input w-full px-5 py-3 rounded-xl text-slate-700">
                </div>
            </div>

            <div>
                <label class="block text-[14px] font-black text-slate-500 mb-2 ml-1 flex items-center gap-1.5 uppercase tracking-wider">
                    <span class="w-2 h-2 rounded-full bg-[#FFC9C9]"></span> 訂購數量 (張)
                </label>
                <input type="number" id="quantity" step="1" min="1" value="1"
                    class="quote-input w-full px-5 py-3 rounded-xl text-slate-700">
            </div>

            <div class="grid grid-cols-4 gap-2">
                <div id="tier-10" class="discount-table-item">
                    <div class="text-[10px] font-bold text-slate-400">10+</div>
                    <div class="text-[14px] font-black text-[#D0BFFF]">9折</div>
                </div>
                <div id="tier-30" class="discount-table-item">
                    <div class="text-[10px] font-bold text-slate-400">30+</div>
                    <div class="text-[14px] font-black text-[#A5D8FF]">85折</div>
                </div>
                <div id="tier-50" class="discount-table-item">
                    <div class="text-[10px] font-bold text-slate-400">50+</div>
                    <div class="text-[14px] font-black text-[#FF8787]">8折</div>
                </div>
                <div id="tier-100" class="discount-table-item">
                    <div class="text-[10px] font-bold text-slate-400">100+</div>
                    <div class="text-[14px] font-black text-red-400">7折</div>
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-500 text-base p-5 rounded-xl text-center font-bold border-2 border-red-200 shadow-sm error-shake-infinite">
                ⚠️ 已超過安全範圍 (28 x 40 cm)
            </div>

            <div id="resultArea" class="result-box p-6 space-y-4">
                <div class="flex justify-between items-center border-b border-white pb-2">
                    <span class="text-[13px] font-black text-slate-400 uppercase tracking-widest">計費級距</span>
                    <span id="tierDisplay" class="text-base font-bold text-slate-600">尚未輸入</span>
                </div>
                <div class="flex justify-between items-center border-b border-white pb-2">
                    <span class="text-[13px] font-black text-slate-400 uppercase tracking-widest">單張原價</span>
                    <span id="unitPriceDisplay" class="text-base font-bold text-slate-600">NT$ 0</span>
                </div>
                <div id="discountRow" class="flex justify-between items-center border-b border-white pb-2 hidden">
                    <div class="flex items-center gap-2">
                        <span class="text-[13px] font-black text-slate-400 uppercase tracking-widest">折扣價</span>
                        <span id="discountBadge" class="discount-badge">9折</span>
                    </div>
                    <span id="afterDiscountDisplay" class="text-lg font-black text-[#FF8787]">NT$ 0</span>
                </div>
                <div id="totalSection" class="pt-2 hidden">
                    <div class="flex justify-between items-center flex-nowrap gap-2">
                        <span class="text-[12px] font-black text-slate-300 uppercase tracking-widest flex-shrink-0">合計總額</span>
                        <span id="totalPriceDisplay" class="text-3xl font-black text-slate-700 whitespace-nowrap">NT$ 0</span>
                    </div>
                    <div class="text-right mt-1">
                        <span id="qtyTotalNote" class="text-[11px] text-slate-400 font-bold">共 0 張</span>
                    </div>
                </div>
            </div>

            <div id="deliveryMessage" class="hidden p-5 rounded-2xl transition-all duration-300 border-2 flex items-center justify-center gap-3">
                <svg id="svgIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p id="deliveryText" class="text-base font-black tracking-wide"></p>
            </div>

            <div id="copySection" class="hidden bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 space-y-3">
                <div class="flex justify-between items-center mb-1 px-1">
                    <span class="text-[12px] font-black text-slate-400 uppercase">報價預覽</span>
                    <button id="btnCopy" class="copy-btn px-4 py-1.5 rounded-full text-xs font-black shadow-sm">點擊複製</button>
                </div>
                <div id="copyContent" class="text-sm text-slate-600 font-medium leading-relaxed whitespace-pre-wrap bg-white/50 p-3 rounded-xl border border-white"></div>
            </div>
        </div>
    </div>
</div>

<!-- ── Modal ── -->
<div id="custom-modal" class="fixed inset-0 bg-slate-900/10 backdrop-blur-md hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
        <div id="modal-icon" class="text-5xl mb-6">💡</div>
        <h3 id="modal-title" class="text-xl font-bold text-slate-700 mb-2">通知</h3>
        <p id="modal-msg" class="text-slate-400 mb-10 leading-relaxed text-sm"></p>
        <div id="modal-footer" class="flex flex-col gap-3">
            <button onclick="toggleModal(false)" class="w-full bg-sky-500 text-white font-bold py-5 rounded-2xl shadow-lg">關閉</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     Firebase + 庫存邏輯
════════════════════════════════════════ -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, addDoc, getDocs, collection, onSnapshot, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'consumable-master-pro';
    const firebaseConfig = {
        apiKey: "AIzaSyD5niBgZ0YygHdDoWpUN2IjGkBnG_Tp8RY",
        authDomain: "consumable-manager-4f7d9.firebaseapp.com",
        projectId: "consumable-manager-4f7d9",
        storageBucket: "consumable-manager-4f7d9.firebasestorage.app",
        messagingSenderId: "792750918268",
        appId: "1:792750918268:web:b2e1082f19718a8ebc57f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentType = 'in';
    let currentCategory = 'uv';
    let allInventoryData = [];

    window.changeType = (type) => {
        currentType = type;
        const btns = { in: 'type-in', out: 'type-out', profit: 'type-profit' };
        const colors = { in: 'btn-active-in', out: 'btn-active-out', profit: 'btn-active-profit' };
        Object.keys(btns).forEach(k => {
            document.getElementById(btns[k]).className = (k === type)
                ? `p-3 rounded-2xl text-xs font-bold transition-all ${colors[k]}`
                : 'btn-inactive p-3 rounded-2xl text-xs font-bold transition-all';
        });
        const nameField = document.getElementById('name-field');
        const qtyBox = document.getElementById('qty-box');
        const priceBox = document.getElementById('price-box');
        const priceLabel = document.getElementById('price-label');
        const submitBtn = document.getElementById('submit-btn');
        if (type === 'in') {
            nameField.style.display = 'block'; qtyBox.style.display = 'block'; priceBox.style.display = 'block';
            priceLabel.innerText = '進貨單價 ($)'; submitBtn.innerText = '確認耗材入庫';
            renderNameInput('input');
        } else if (type === 'out') {
            nameField.style.display = 'block'; qtyBox.style.display = 'block'; priceBox.style.display = 'none';
            submitBtn.innerText = '消耗耗材量'; renderNameInput('select');
        } else {
            nameField.style.display = 'none'; qtyBox.style.display = 'none'; priceBox.style.display = 'block';
            priceLabel.innerText = '本次營收金額 ($)'; submitBtn.innerText = '累計成品收益';
        }
    };

    window.changeCategory = (cat) => {
        currentCategory = cat;
        document.getElementById('cat-uv').className = cat === 'uv' ? 'btn-active-in p-4 rounded-2xl font-bold text-sm' : 'btn-inactive p-4 rounded-2xl font-bold text-sm';
        document.getElementById('cat-vinyl').className = cat === 'vinyl' ? 'btn-active-out p-4 rounded-2xl font-bold text-sm' : 'btn-inactive p-4 rounded-2xl font-bold text-sm';
        if (currentType === 'out') renderNameInput('select');
    };

    function renderNameInput(mode) {
        const container = document.getElementById('name-input-container');
        if (mode === 'input') {
            container.innerHTML = `<input type="text" id="input-name" placeholder="例如: 藍色膠捲" class="w-full p-4 rounded-2xl bg-white/80 font-bold text-slate-600">`;
        } else {
            const filtered = allInventoryData.filter(item => item.category === currentCategory && item.qty > 0);
            let options = filtered.map(item => `<option value="${item.name}">${item.name} (剩 ${item.qty})</option>`).join('');
            if (!options) options = `<option value="">-- 無庫存 --</option>`;
            container.innerHTML = `<select id="input-name" class="w-full p-4 rounded-2xl bg-white/80 font-bold text-slate-600">${options}</select>`;
        }
    }

    window.submitTransaction = async () => {
        if (!auth.currentUser) return;
        const nameInput = document.getElementById('input-name');
        const name = (currentType === 'profit') ? '收益' : nameInput?.value?.trim();
        const qty = parseInt(document.getElementById('input-qty')?.value || 0);
        const price = parseFloat(document.getElementById('input-price').value || 0);
        if (!name && currentType !== 'profit') { showMsg('提示', '請提供耗材名稱', '⚠️'); return; }
        try {
            if (currentType !== 'profit') {
                const docId = `${currentCategory}_${name.replace(/[\/.\#$\[\]]/g, '-')}`;
                const invRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', docId);
                const invSnap = await getDoc(invRef);
                let currentData = invSnap.exists() ? invSnap.data() : { qty: 0, totalInvested: 0, category: currentCategory, name: name };
                if (currentType === 'in') {
                    await setDoc(invRef, { ...currentData, qty: currentData.qty + qty, totalInvested: (currentData.totalInvested || 0) + (qty * price), lastUpdate: serverTimestamp() });
                } else if (currentType === 'out') {
                    if (currentData.qty < qty) { showMsg('庫存不足', `剩餘 ${currentData.qty}`, '❌'); return; }
                    await setDoc(invRef, { ...currentData, qty: currentData.qty - qty, lastUpdate: serverTimestamp() });
                }
            } else {
                const transCol = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                await addDoc(transCol, { category: currentCategory, amount: price, timestamp: serverTimestamp() });
            }
            if (currentType === 'in' && nameInput) nameInput.value = '';
            document.getElementById('input-price').value = '';
            showMsg('成功', '紀錄已同步至雲端', '✅');
        } catch (e) { showMsg('錯誤', '連線失敗，請檢查網路', '📡'); }
    };

    window.confirmDeleteItem = (cat, name) => {
        const docId = `${cat}_${name.replace(/[\/.\#$\[\]]/g, '-')}`;
        showMsg('確認刪除', `確定要永久刪除「${name}」及其成本紀錄嗎？`, '🗑️', true, async () => {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', docId));
                toggleModal(false);
            } catch (e) { showMsg('錯誤', '刪除失敗', '❌'); }
        });
    };

    window.resetProfit = async (cat) => {
        showMsg('重置收益', `確定要歸零「${cat === 'uv' ? 'UV' : '割字'}」的所有收益嗎？`, '🔄', true, async () => {
            try {
                toggleModal(false);
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'));
                const batch = writeBatch(db);
                let count = 0;
                snap.forEach(d => { if (d.data().category === cat) { batch.delete(d.ref); count++; } });
                if (count > 0) await batch.commit();
                showMsg('完成', '收益已歸零', '✅');
            } catch (e) { showMsg('錯誤', '重置失敗', '❌'); }
        });
    };

    function setupListeners() {
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), (snap) => {
            allInventoryData = [];
            snap.forEach(d => allInventoryData.push(d.data()));
            renderTable('uv', allInventoryData.filter(i => i.category === 'uv'));
            renderTable('vinyl', allInventoryData.filter(i => i.category === 'vinyl'));
            const uvInvest = allInventoryData.filter(i => i.category === 'uv').reduce((a, b) => a + (b.totalInvested || 0), 0);
            const vinylInvest = allInventoryData.filter(i => i.category === 'vinyl').reduce((a, b) => a + (b.totalInvested || 0), 0);
            document.getElementById('stat-uv-value').innerText = `$${Math.round(uvInvest).toLocaleString()}`;
            document.getElementById('stat-vinyl-value').innerText = `$${Math.round(vinylInvest).toLocaleString()}`;
            if (currentType === 'out') renderNameInput('select');
            updateLastSync();
        });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
            let uv = 0, vinyl = 0;
            snap.forEach(d => { const data = d.data(); if (data.category === 'uv') uv += data.amount || 0; else vinyl += data.amount || 0; });
            document.getElementById('stat-uv-profit').innerText = `$${Math.round(uv).toLocaleString()}`;
            document.getElementById('stat-vinyl-profit').innerText = `$${Math.round(vinyl).toLocaleString()}`;
            updateLastSync();
        });
    }

    function updateLastSync() {
        document.getElementById('last-sync-time').innerText = `最後雲端同步：${new Date().toLocaleTimeString()}`;
    }

    function renderTable(cat, items) {
        const body = document.getElementById(`inventory-${cat}-body`);
        if (!items.length) { body.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-300 italic">暫無資料</td></tr>`; return; }
        body.innerHTML = items.map(i => `
            <tr class="hover:bg-white/50 transition-colors">
                <td class="px-8 py-5 font-bold text-slate-600">${i.name}</td>
                <td class="px-6 py-5 text-center">
                    <span class="${i.qty > 0 ? 'text-sky-500 bg-sky-50' : 'text-rose-400 bg-rose-50'} px-3 py-1 rounded-full font-black text-xs">${i.qty}</span>
                </td>
                <td class="px-6 py-5 font-medium text-slate-400">$${Math.round(i.totalInvested || 0).toLocaleString()}</td>
                <td class="px-8 py-5 text-right">
                    <button onclick="confirmDeleteItem('${i.category}', '${i.name}')" class="delete-btn text-rose-300 hover:text-rose-500 p-2">✕</button>
                </td>
            </tr>
        `).join('');
    }

    window.onload = async () => {
        try {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                if (u) {
                    document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-emerald-400';
                    document.getElementById('status-text').innerText = '連線正常 (Cloud Online)';
                    const b = document.getElementById('submit-btn');
                    b.disabled = false;
                    b.className = 'w-full bg-sky-400 hover:bg-sky-500 text-white font-black py-5 rounded-[1.5rem] shadow-lg transition-all';
                    changeType('in');
                    setupListeners();
                }
            });
        } catch (e) { document.getElementById('status-text').innerText = '連線失敗'; }
    };

    window.showMsg = (title, msg, icon, isConfirm = false, onConfirm = null) => {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        document.getElementById('modal-icon').innerText = icon || '💡';
        const footer = document.getElementById('modal-footer');
        if (isConfirm) {
            footer.innerHTML = `
                <button id="modal-confirm-btn" class="w-full bg-rose-400 text-white font-bold py-4 rounded-2xl shadow-lg">確認執行</button>
                <button onclick="toggleModal(false)" class="w-full bg-slate-100 text-slate-400 font-bold py-4 rounded-2xl">取消</button>`;
            document.getElementById('modal-confirm-btn').onclick = onConfirm;
        } else {
            footer.innerHTML = `<button onclick="toggleModal(false)" class="w-full bg-sky-400 text-white font-bold py-4 rounded-2xl shadow-lg">知道了</button>`;
        }
        toggleModal(true);
    };

    window.toggleModal = (s) => document.getElementById('custom-modal').style.display = s ? 'flex' : 'none';
</script>

<!-- ══════════════════════════════════════
     Tab 切換 + 報價計算邏輯
════════════════════════════════════════ -->
<script>
    // ── Tab 切換 ──
    window.switchTab = (tab) => {
        const pages = ['inventory', 'quote'];
        pages.forEach(p => {
            document.getElementById(`page-${p}`).classList.toggle('hidden', p !== tab);
            const btn = document.getElementById(`tab-${p}`);
            btn.classList.toggle('active', p === tab);
            btn.classList.toggle('inactive', p !== tab);
        });
    };

    // ── 報價計算 ──
    const SAFE_W = 28.0, SAFE_L = 40.0;
    const A3_AREA = 29.7 * 42.0;
    const MARGIN = 2.0;

    function calculate() {
        const l = parseFloat(document.getElementById('length').value) || 0;
        const w = parseFloat(document.getElementById('width').value) || 0;
        const qty = parseInt(document.getElementById('quantity').value) || 1;

        updateDiscountTable(qty);

        const isSafe = (l <= SAFE_L && w <= SAFE_W) || (l <= SAFE_W && w <= SAFE_L);

        if (l > 0 && w > 0 && !isSafe) {
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('opacity-30');
            document.getElementById('deliveryMessage').classList.add('hidden');
            document.getElementById('copySection').classList.add('hidden');
            clearDisplay();
            return;
        }

        document.getElementById('errorMessage').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('opacity-30');

        if (l <= 0 || w <= 0) {
            document.getElementById('deliveryMessage').classList.add('hidden');
            document.getElementById('copySection').classList.add('hidden');
            clearDisplay();
            return;
        }

        const itemArea = (l + MARGIN) * (w + MARGIN);
        let ratio = itemArea / A3_AREA;
        if (ratio > 1) ratio = 1;
        const totalA3Usage = (itemArea * qty) / A3_AREA;

        let multiplier = 1.0, tierName = "";
        if (ratio < 0.1) {
            multiplier = 1.7; tierName = "精緻小尺寸";
        } else {
            multiplier = 1.7 - ((ratio - 0.1) * (0.7 / 0.9));
            if (multiplier < 1.0) multiplier = 1.0;
            tierName = (ratio >= 0.85) ? "大尺寸" : "標準尺寸";
        }

        let originalUnitPrice = Math.ceil((350 * ratio) * multiplier);
        if (originalUnitPrice < 1) originalUnitPrice = 1;
        if (originalUnitPrice > 350) originalUnitPrice = 350;

        document.getElementById('unitPriceDisplay').innerText = `NT$ ${originalUnitPrice}`;
        document.getElementById('tierDisplay').innerText = tierName;

        let discount = 1.0, discountLabel = "", discountThreshold = 0;
        if (qty >= 100) { discount = 0.7; discountLabel = "7折"; discountThreshold = 100; }
        else if (qty >= 50) { discount = 0.8; discountLabel = "8折"; discountThreshold = 50; }
        else if (qty >= 30) { discount = 0.85; discountLabel = "85折"; discountThreshold = 30; }
        else if (qty >= 10) { discount = 0.9; discountLabel = "9折"; discountThreshold = 10; }

        let discountedUnitPrice = originalUnitPrice;
        if (discount < 1) {
            document.getElementById('discountBadge').innerText = discountLabel;
            document.getElementById('discountRow').classList.remove('hidden');
            discountedUnitPrice = Math.round((originalUnitPrice * discount) * 10) / 10;
        } else {
            document.getElementById('discountRow').classList.add('hidden');
        }

        let finalTotal = Math.round(discountedUnitPrice * qty);
        document.getElementById('afterDiscountDisplay').innerText = `NT$ ${discountedUnitPrice.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 1 })}`;
        document.getElementById('totalPriceDisplay').innerText = `NT$ ${finalTotal.toLocaleString()}`;
        document.getElementById('qtyTotalNote').innerText = `總共 ${qty} 張 (約 ${totalA3Usage.toFixed(1)} 張 A3 版面)`;
        document.getElementById('totalSection').classList.toggle('hidden', qty <= 1);

        const isHeavy = totalA3Usage > 4;
        const dm = document.getElementById('deliveryMessage');
        if (isHeavy) {
            dm.classList.remove('hidden');
            dm.className = "p-5 rounded-2xl border-2 bg-white alert-pulse text-red-500 border-red-200 flex items-center justify-center gap-3 mb-4";
            document.getElementById('deliveryText').innerText = "量大需 2-3 工作天";
        } else {
            dm.classList.add('hidden');
        }

        updateCopyText(l, w, originalUnitPrice, discountedUnitPrice, finalTotal, qty, isHeavy, discount < 1, discountLabel, discountThreshold);
    }

    function updateDiscountTable(qty) {
        [{ id: 'tier-10', min: 10, max: 29 }, { id: 'tier-30', min: 30, max: 49 },
         { id: 'tier-50', min: 50, max: 99 }, { id: 'tier-100', min: 100, max: Infinity }]
        .forEach(tier => {
            document.getElementById(tier.id).classList.toggle('active', qty >= tier.min && qty <= tier.max);
        });
    }

    function updateCopyText(l, w, original, unit, total, qty, isHeavy, hasDiscount, discountLabel, threshold) {
        document.getElementById('copySection').classList.remove('hidden');
        let text = `您好，報價如下：\n${l} x ${w} cm，$${original}/張\n`;
        if (hasDiscount) text += `滿${threshold}張有打${discountLabel}唷，$${unit}/張\n`;
        if (qty > 1) text += `總金額 $${total}，共 ${qty} 張\n`;
        if (total < 60) text += `若不滿 $60 會以 $60 計價，看您有無其他訂購唷，小本生意請您見諒。\n`;
        if (isHeavy) text += `工作天 2-3 天 (不含假日)`;
        document.getElementById('copyContent').innerText = text.trim();
    }

    function clearDisplay() {
        document.getElementById('tierDisplay').innerText = "尚未輸入";
        document.getElementById('unitPriceDisplay').innerText = "NT$ 0";
        document.getElementById('afterDiscountDisplay').innerText = "NT$ 0";
        document.getElementById('totalPriceDisplay').innerText = "NT$ 0";
        document.getElementById('qtyTotalNote').innerText = "共 0 張";
        document.getElementById('discountRow').classList.add('hidden');
        document.getElementById('totalSection').classList.add('hidden');
        updateDiscountTable(0);
    }

    document.getElementById('btnCopy').addEventListener('click', () => {
        const text = document.getElementById('copyContent').innerText;
        const tmp = document.createElement("textarea");
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        document.body.removeChild(tmp);
        const btn = document.getElementById('btnCopy');
        btn.innerText = "已複製！";
        btn.style.background = "#82C91E";
        setTimeout(() => { btn.innerText = "點擊複製"; btn.style.background = ""; }, 1500);
    });

    document.getElementById('length').addEventListener('input', calculate);
    document.getElementById('width').addEventListener('input', calculate);
    document.getElementById('quantity').addEventListener('input', calculate);
</script>
